<svg viewBox="0 0 1600 950" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="aOrange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c2410c"/></marker>
    <marker id="aViolet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="aGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#059669"/></marker>
    <marker id="aBlue2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="aPink" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#db2777"/></marker>
  </defs>
  <style>
    .lbl { font-size: 11px; fill:#1f2937; paint-order: stroke fill; stroke:#ffffff; stroke-width: 4px; }
    .proc { font-size: 13px; font-weight:700; text-anchor:middle; }
    .storeText { font-size: 12px; font-weight:600; text-anchor:middle; fill:#1f2937; }
  </style>

  <rect x="0" y="0" width="1600" height="950" fill="#ffffff"/>
  <text x="800" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">DFD Level 1 — Decomposition of Sales Management System</text>

  <!-- Entities -->
  <rect x="20" y="70" width="190" height="110" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="115" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">CUSTOMER</text>
  <text x="115" y="140" text-anchor="middle" font-size="10.5" font-style="italic" fill="#475569">(External Entity)</text>

  <rect x="1390" y="70" width="190" height="110" fill="#fff7ed" stroke="#c2410c" stroke-width="2.5"/>
  <text x="1485" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">ADMIN</text>
  <text x="1485" y="140" text-anchor="middle" font-size="10.5" font-style="italic" fill="#475569">(External Entity)</text>

  <!-- Process row (y 240-350) -->
  <g>
    <rect x="225" y="240" width="210" height="110" rx="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.2"/>
    <text x="330" y="285" class="proc" fill="#5b21b6">1.0</text>
    <text x="330" y="305" class="proc" fill="#5b21b6">Authentication</text>
    <text x="330" y="320" class="proc" fill="#5b21b6">Management</text>

    <rect x="460" y="240" width="210" height="110" rx="22" fill="#ecfdf5" stroke="#059669" stroke-width="2.2"/>
    <text x="565" y="285" class="proc" fill="#065f46">2.0</text>
    <text x="565" y="305" class="proc" fill="#065f46">Product</text>
    <text x="565" y="320" class="proc" fill="#065f46">Management</text>

    <rect x="695" y="240" width="210" height="110" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2.2"/>
    <text x="800" y="285" class="proc" fill="#1e3a8a">3.0</text>
    <text x="800" y="305" class="proc" fill="#1e3a8a">Purchase</text>
    <text x="800" y="320" class="proc" fill="#1e3a8a">Management</text>

    <rect x="930" y="240" width="210" height="110" rx="22" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
    <text x="1035" y="285" class="proc" fill="#92400e">4.0</text>
    <text x="1035" y="305" class="proc" fill="#92400e">Account</text>
    <text x="1035" y="320" class="proc" fill="#92400e">Management</text>

    <rect x="1165" y="240" width="210" height="110" rx="22" fill="#fdf2f8" stroke="#db2777" stroke-width="2.2"/>
    <text x="1270" y="278" class="proc" fill="#9d174d">5.0</text>
    <text x="1270" y="295" class="proc" fill="#9d174d">Reporting &amp;</text>
    <text x="1270" y="310" class="proc" fill="#9d174d">Statistics</text>
    <text x="1270" y="325" class="proc" fill="#9d174d">Management</text>
  </g>

  <!-- Data stores row (y 560-650) -->
  <g>
    <!-- helper store shape: top line, bottom line, left bar -->
    <!-- D1 -->
    <rect x="120" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M120,560 H330 M120,650 H330 M128,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="225" y="595" class="storeText">D1</text>
    <text x="225" y="615" class="storeText">Customers</text>

    <rect x="350" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M350,560 H560 M350,650 H560 M358,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="455" y="595" class="storeText">D2</text>
    <text x="455" y="615" class="storeText">Admins</text>

    <rect x="580" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M580,560 H790 M580,650 H790 M588,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="685" y="595" class="storeText">D3</text>
    <text x="685" y="615" class="storeText">Products</text>

    <rect x="810" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M810,560 H1020 M810,650 H1020 M818,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="915" y="595" class="storeText">D4</text>
    <text x="915" y="615" class="storeText">Orders</text>

    <rect x="1040" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M1040,560 H1250 M1040,650 H1250 M1048,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="1145" y="595" class="storeText">D5</text>
    <text x="1145" y="615" class="storeText">OrderItems</text>

    <rect x="1270" y="560" width="210" height="90" fill="#f8fafc"/>
    <path d="M1270,560 H1480 M1270,650 H1480 M1278,560 V650" stroke="#334155" stroke-width="1.6" fill="none"/>
    <text x="1375" y="590" class="storeText">D6</text>
    <text x="1375" y="608" class="storeText">Balance</text>
    <text x="1375" y="624" class="storeText">Transactions</text>
  </g>

  <!-- ===== Customer -> Processes ===== -->
  <g stroke="#1d4ed8" stroke-width="1.6" fill="none" marker-end="url(#aBlue)">
    <line x1="40" y1="180" x2="270" y2="240"/>
    <line x1="65" y1="180" x2="480" y2="240"/>
    <line x1="115" y1="180" x2="740" y2="240"/>
    <line x1="165" y1="180" x2="980" y2="240"/>
  </g>
  <g stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#aBlue2)">
    <line x1="90" y1="180" x2="520" y2="240"/>
    <line x1="140" y1="180" x2="860" y2="240"/>
    <line x1="190" y1="180" x2="1090" y2="240"/>
  </g>
  <text class="lbl" x="130" y="195">Login Credentials</text>
  <text class="lbl" x="270" y="200">Browse / Search Request</text>
  <text class="lbl" x="330" y="195" text-anchor="middle">Product List &amp; Results</text>
  <text class="lbl" x="420" y="350" text-anchor="middle">Purchase Request / View Orders Request</text>
  <text class="lbl" x="480" y="380" text-anchor="middle">Order Confirmation &amp; History</text>
  <text class="lbl" x="620" y="420" text-anchor="middle">Recharge / Edit / Delete Request</text>
  <text class="lbl" x="700" y="450" text-anchor="middle">Account &amp; Balance Confirmation</text>

  <!-- ===== Admin -> Processes ===== -->
  <g stroke="#c2410c" stroke-width="1.6" fill="none" marker-end="url(#aOrange)">
    <line x1="1410" y1="180" x2="390" y2="240"/>
    <line x1="1450" y1="180" x2="610" y2="240"/>
    <line x1="1530" y1="180" x2="1210" y2="240"/>
  </g>
  <g stroke="#ea580c" stroke-width="1.6" fill="none" marker-end="url(#aOrange)">
    <line x1="1490" y1="180" x2="650" y2="240"/>
    <line x1="1560" y1="180" x2="1330" y2="240"/>
  </g>
  <text class="lbl" x="1100" y="200" text-anchor="end">Login Credentials</text>
  <text class="lbl" x="1080" y="225" text-anchor="end">Product / Inventory Data</text>
  <text class="lbl" x="1000" y="430" text-anchor="end">Update Confirmation</text>
  <text class="lbl" x="1350" y="430" text-anchor="end">Report / Statistics Request</text>
  <text class="lbl" x="1450" y="460" text-anchor="end">Reports, Profit &amp; Capital Stats</text>

  <!-- ===== Processes <-> Data Stores ===== -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#aViolet)">
    <line x1="300" y1="350" x2="225" y2="560"/>
    <line x1="360" y1="350" x2="455" y2="560"/>
  </g>
  <text class="lbl" x="245" y="470">Verify Customer</text>
  <text class="lbl" x="420" y="470">Verify Admin</text>

  <g stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#aGreen)">
    <line x1="565" y1="350" x2="685" y2="560"/>
  </g>
  <text class="lbl" x="600" y="470">Read / Write Products</text>

  <g stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#aBlue2)">
    <line x1="760" y1="350" x2="700" y2="560"/>
    <line x1="780" y1="350" x2="260" y2="560"/>
    <line x1="830" y1="350" x2="900" y2="560"/>
    <line x1="860" y1="350" x2="1130" y2="560"/>
  </g>
  <text class="lbl" x="740" y="470">Update Stock</text>
  <text class="lbl" x="500" y="510">Check / Update Balance</text>
  <text class="lbl" x="870" y="500">Create Order</text>
  <text class="lbl" x="990" y="500">Create Order Items</text>

  <g stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#aAmber)">
    <line x1="980" y1="350" x2="280" y2="560"/>
    <line x1="1100" y1="350" x2="1400" y2="560"/>
  </g>
  <text class="lbl" x="640" y="540">Update Customer Record</text>
  <text class="lbl" x="1260" y="500">Log Transaction</text>

  <g stroke="#db2777" stroke-width="1.5" fill="none" marker-end="url(#aPink)">
    <line x1="1190" y1="350" x2="250" y2="560"/>
    <line x1="1220" y1="350" x2="685" y2="560"/>
    <line x1="1250" y1="350" x2="915" y2="560"/>
    <line x1="1290" y1="350" x2="1145" y2="560"/>
    <line x1="1330" y1="350" x2="1375" y2="560"/>
  </g>
  <text class="lbl" x="1240" y="430">Read Customers</text>
  <text class="lbl" x="1080" y="455">Read Products / Orders / Items / Transactions</text>

  <text x="800" y="920" text-anchor="middle" font-size="12" fill="#6b7280">Color legend — Violet: Authentication (1.0), Green: Product (2.0), Blue: Purchase (3.0), Amber: Account (4.0), Pink: Reporting (5.0)</text>
</svg>
