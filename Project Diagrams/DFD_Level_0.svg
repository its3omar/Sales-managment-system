<svg viewBox="0 0 1500 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrIn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f2937"/>
    </marker>
  </defs>
  <style>
    .lbl { font-size: 11.5px; fill:#1f2937; paint-order: stroke fill; stroke:#ffffff; stroke-width: 4px; }
  </style>

  <rect x="0" y="0" width="1500" height="700" fill="#ffffff"/>
  <text x="750" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">DFD Level 0 — Context Diagram (Sales Management System)</text>

  <!-- Customer Entity -->
  <rect x="40" y="90" width="200" height="300" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="140" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">CUSTOMER</text>
  <text x="140" y="140" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">(External Entity)</text>

  <!-- Admin Entity -->
  <rect x="1260" y="90" width="200" height="260" fill="#fff7ed" stroke="#c2410c" stroke-width="2.5"/>
  <text x="1360" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">ADMIN</text>
  <text x="1360" y="140" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">(External Entity)</text>

  <!-- Process (center) -->
  <rect x="560" y="120" width="380" height="420" rx="26" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2.5"/>
  <text x="750" y="305" text-anchor="middle" font-size="26" font-weight="700" fill="#6d28d9">0</text>
  <text x="750" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">Sales Management</text>
  <text x="750" y="355" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">System</text>
  <text x="750" y="378" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">(Main Process)</text>

  <!-- ===== Customer <-> Process flows ===== -->
  <!-- IN flows: customer -> process -->
  <g stroke="#1d4ed8" stroke-width="1.7" fill="none">
    <line x1="240" y1="110" x2="560" y2="140" marker-end="url(#arrIn)"/>
    <line x1="240" y1="147" x2="560" y2="194" marker-end="url(#arrIn)"/>
    <line x1="240" y1="184" x2="560" y2="249" marker-end="url(#arrIn)"/>
    <line x1="240" y1="221" x2="560" y2="303" marker-end="url(#arrIn)"/>
    <line x1="240" y1="258" x2="560" y2="357" marker-end="url(#arrIn)"/>
  </g>
  <text class="lbl" x="320" y="105">Login Credentials</text>
  <text class="lbl" x="300" y="150">Product Browse / Search Request</text>
  <text class="lbl" x="320" y="205">Purchase Request</text>
  <text class="lbl" x="300" y="262">Balance Recharge Request</text>
  <text class="lbl" x="290" y="318">Account Update / Delete Request</text>

  <!-- OUT flows: process -> customer -->
  <g stroke="#2563eb" stroke-width="1.7" fill="none">
    <line x1="560" y1="411" x2="240" y2="295" marker-end="url(#arrIn)"/>
    <line x1="560" y1="466" x2="240" y2="332" marker-end="url(#arrIn)"/>
    <line x1="560" y1="520" x2="240" y2="370" marker-end="url(#arrIn)"/>
  </g>
  <text class="lbl" x="295" y="388">Product List &amp; Search Results</text>
  <text class="lbl" x="290" y="438">Order Confirmation &amp; History</text>
  <text class="lbl" x="270" y="488">Balance / Account Update Confirmation</text>

  <!-- ===== Admin <-> Process flows ===== -->
  <!-- IN flows: admin -> process -->
  <g stroke="#c2410c" stroke-width="1.7" fill="none">
    <line x1="1260" y1="110" x2="940" y2="160" marker-end="url(#arrIn)"/>
    <line x1="1260" y1="154" x2="940" y2="228" marker-end="url(#arrIn)"/>
    <line x1="1260" y1="198" x2="940" y2="296" marker-end="url(#arrIn)"/>
    <line x1="1260" y1="242" x2="940" y2="364" marker-end="url(#arrIn)"/>
  </g>
  <text class="lbl" x="985" y="120" text-anchor="end">Login Credentials</text>
  <text class="lbl" x="1010" y="168" text-anchor="end">Product Data (Add / Edit / Delete)</text>
  <text class="lbl" x="985" y="245" text-anchor="end">Inventory Update</text>
  <text class="lbl" x="1000" y="318" text-anchor="end">Report / Statistics Request</text>

  <!-- OUT flows: process -> admin -->
  <g stroke="#ea580c" stroke-width="1.7" fill="none">
    <line x1="940" y1="432" x2="1260" y2="286" marker-end="url(#arrIn)"/>
    <line x1="940" y1="500" x2="1260" y2="330" marker-end="url(#arrIn)"/>
  </g>
  <text class="lbl" x="990" y="402" text-anchor="end">Customer List &amp; Inventory Status</text>
  <text class="lbl" x="980" y="470" text-anchor="end">Reports, Profit &amp; Capital Statistics</text>

  <text x="750" y="660" text-anchor="middle" font-size="12" fill="#6b7280">All data ultimately flows through process "0" — internal decomposition is shown in DFD Level 1.</text>
</svg>
